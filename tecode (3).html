function Btn({children,onClick,v="primary",sm,full,sx={}}){

/* ── FIELD ── */
function Field({label,value,onChange,type="text",placeholder="",onEnter,sx={}}){
  const [foc,setFoc]=useState(false);
  const bdr=foc?"#4facfe":"#252a3d";
  if(type==="file")return React.createElement("div",{style:{marginBottom:14,...sx}},
    label&&React.createElement("div",{style:{fontSize:12,color:"#6b7299",marginBottom:6}},label),
    React.createElement("input",{type:"file",accept:"image/*",onChange:e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);}},style:{color:"#6b7299",fontSize:13,width:"100%"}})
  );

    label&&React.createElement("div",{style:{fontSize:12,color:"#6b7299",marginBottom:6}},label),

  );

  );
}

/* ── TOAST ── */
function Toast({msg,type}){
  const c={info:"#4facfe",success:"#2ed573",warn:"#ffa502",error:"#ff4757"}[type]||"#4facfe";

    React.createElement("span",null,{success:"✓",warn:"⚠",error:"✕",info:"ℹ"}[type]||"ℹ"),msg

  useEffect(()=>{const t=setInterval(()=>setCds(p=>p.filter(c=>c.until>Date.now())),500);return()=>clearInterval(t);},[]);
  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs,chatPeer,view]);
  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),3000);return()=>clearTimeout(t);}},[toast]);
  useEffect(()=>{
    if(!callUI||callUI.state!=="active"){setCallSec(0);return;}
    callTimerRef.current=setInterval(()=>setCallSec(p=>p+1),1000);
    return()=>clearInterval(callTimerRef.current);
  },[callUI?.state]);

  /* stop stream on unmount */
  useEffect(()=>()=>{callStream?.getTracks().forEach(t=>t.stop());},[callStream]);

  /* ring sound using AudioContext - plays while calling/incoming */
  useEffect(()=>{
    if(!callUI||(callUI.state!=="calling"&&callUI.state!=="ringing"))return;
    let ctx,osc,gain,stopped=false;
    const ring=()=>{
      try{
        ctx=new(window.AudioContext||window.webkitAudioContext)();
        gain=ctx.createGain();gain.gain.value=0.15;gain.connect(ctx.destination);
        const play=()=>{if(stopped)return;osc=ctx.createOscillator();osc.type="sine";osc.frequency.value=440;osc.connect(gain);osc.start();setTimeout(()=>{if(!stopped){osc.stop();setTimeout(()=>{if(!stopped)play();},400);}},600);};
        play();
      }catch(e){}
    };
    ring();
    return()=>{stopped=true;try{osc?.stop();ctx?.close();}catch(e){}};
  },[callUI?.state]);

  const getU=id=>id==="__ai__"?AI_BOT:users.find(u=>u.id===id);
  const isFr=(a,b)=>friends.some(f=>(f[0]===a&&f[1]===b)||(f[0]===b&&f[1]===a));
  const isBan=id=>{const b=bans.find(x=>x.userId===id);if(!b)return false;if(b.until==="perm")return true;return b.until>Date.now();};
  const myFr=()=>me?friends.filter(f=>f.includes(me.id)).map(f=>f[0]===me.id?f[1]:f[0]).map(getU).filter(Boolean):[];
  const myReqs=()=>reqs.filter(r=>r.to===me?.id);
  const convMs=peer=>msgs[cid(me?.id,peer)]||[];
  const showT=(msg,type="info")=>setToast({msg,type});

  /* CALL HELPERS */
  const requestMedia=async(type)=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia(
        type==="video"?{audio:true,video:true}:{audio:true}
      );
      return stream;
    }catch(err){
      if(err.name==="NotAllowedError")showT("Permission denied. Please allow mic/camera.","error");
      else showT("Could not access mic/camera.","error");
      return null;
    }
  };
  const startCall=async(type)=>{
    const stream=await requestMedia(type);
    if(!stream)return;
    setCallStream(stream);
    setCallMuted(false);setCallCamOff(false);setCallSec(0);
    setCallUI({type,state:"calling",peer:chatPeer});
    /* simulate: peer "answers" after 4-8s (in real app this is signalling) */
    const t=setTimeout(()=>{
      setCallUI(p=>p&&p.state==="calling"?{...p,state:"active"}:p);
    },Math.floor(Math.random()*4000)+4000);
    callRingRef.current=t;
  };
  const answerCall=async()=>{
    if(!incomingCall)return;
    const stream=await requestMedia(incomingCall.type);
    setCallStream(stream||null);
    setCallMuted(false);setCallCamOff(false);setCallSec(0);
    setCallUI({type:incomingCall.type,state:"active",peer:incomingCall.from});
    setIncomingCall(null);
  };
  const declineCall=()=>{
    setIncomingCall(null);showT("Call declined.","info");
  };
  const endCall=()=>{
    clearTimeout(callRingRef.current);
    callStream?.getTracks().forEach(t=>t.stop());
    setCallStream(null);setCallUI(null);setCallSec(0);
  };
  const toggleMute=()=>{
    if(callStream){callStream.getAudioTracks().forEach(t=>t.enabled=callMuted);}
    setCallMuted(p=>!p);
  };
  const toggleCam=()=>{
    if(callStream){callStream.getVideoTracks().forEach(t=>t.enabled=callCamOff);}
    setCallCamOff(p=>!p);
  };

  /* STATUS HELPERS */
  const myStatus=()=>statuses.filter(s=>s.userId===me?.id);
  const friendStatuses=()=>statuses.filter(s=>isFr(me?.id,s.userId)&&s.userId!==me?.id&&Date.now()-s.ts<86400000);
  const markStatusSeen=(stId)=>setStatuses(p=>p.map(s=>s.id===stId?{...s,seenBy:[...new Set([...s.seenBy,me.id])]}:s));
  const deleteStatus=(stId)=>setStatuses(p=>p.filter(s=>s.id!==stId));
  const postStatus=()=>{
    if(!upMedia){showT("Pick a photo or video first.","warn");return;}
    const ns={id:uid(),userId:me.id,media:upMedia,mediaType:upMediaType,text:upText,textX:upTextX,textY:upTextY,textColor:upTextColor,textSize:upTextSize,ts:Date.now(),seenBy:[me.id]};
    setStatuses(p=>[...p.filter(s=>s.userId!==me.id),ns]);
    setUpMedia(null);setUpText("");setUpTextX(50);setUpTextY(50);setUpTextColor("#ffffff");setUpTextSize(22);
    setStatusUpload(false);setDashTab("status");showT("Status posted!","success");
  };
  const fmtT=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const isMobile=()=>window.innerWidth<700;

  /* Auth */
  const doLogin=()=>{
    const u=users.find(x=>x.username===lf.u&&x.password===lf.p);
    if(!u){setAErr("Invalid username or password.");return;}
    if(isBan(u.id)){setAErr("Your account has been banned.");return;}
    setMe({...u});setView("dashboard");setAErr("");setLf({u:"",p:""});
  };
  const doSignup=()=>{
    if(!sf.u||!sf.dn||!sf.p){setAErr("Fill all required fields.");return;}

    setUsers(p=>[...p,nu]);setMe(nu);setView("dashboard");setAErr("");

  /* Friends */
  const sendReq=toId=>{
    const left=cdLeft(cds,me.id,toId);
    if(left>0){showT(`Wait ${left}s before re-requesting.`,"warn");return;}
    if(isFr(me.id,toId)){showT("Already friends!","info");return;}

    setReqs(p=>[...p,{id:uid(),from:me.id,to:toId}]);showT("Friend request sent! ✓","success");
  };
  const acceptReq=id=>{const r=reqs.find(x=>x.id===id);if(!r)return;setFriends(p=>[...p,[r.from,r.to]]);setReqs(p=>p.filter(x=>x.id!==id));showT("Friend added!","success");};
  const ignoreReq=id=>{const r=reqs.find(x=>x.id===id);if(!r)return;setCds(p=>[...p,{from:r.from,to:r.to,until:Date.now()+60000}]);setReqs(p=>p.filter(x=>x.id!==id));};

  /* Messages */
  const sendMsg=async()=>{
    if(!input.trim())return;
    const convId=cid(me.id,chatPeer);
    const m={id:uid(),from:me.id,text:input,ts:Date.now(),seen:false,reply:replyTo,incog,selfD:incog};
    setMsgs(p=>({...p,[convId]:[...(p[convId]||[]),m]}));
    const txt=input;setInput("");setReplyTo(null);
    if(chatPeer==="__ai__"){
      setAiLoad(true);
      try{
        const history=(msgs[convId]||[]).slice(-10).map(x=>({role:x.from===me.id?"user":"assistant",content:x.text}));
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are Tecode AI, the smart assistant built into Tecode messaging app. Be helpful, friendly and concise.",messages:[...history,{role:"user",content:txt}]})});
        const data=await resp.json();
        const aiTxt=data.content?.[0]?.text||"Sorry, couldn't respond right now.";
        setMsgs(p=>({...p,[convId]:[...(p[convId]||[]),{id:uid(),from:"__ai__",text:aiTxt,ts:Date.now(),seen:false,reply:null,incog:false,selfD:false}]}));
      }catch{
        setMsgs(p=>({...p,[convId]:[...(p[convId]||[]),{id:uid(),from:"__ai__",text:"⚠️ Connection error.",ts:Date.now(),seen:false,reply:null,incog:false,selfD:false}]}));
      }
      setAiLoad(false);
    }
  };
  const markSeen=(convId,msgId)=>setMsgs(p=>{const list=p[convId]||[];return {...p,[convId]:list.map(m=>{if(m.id!==msgId||m.seen)return m;if(m.selfD)return null;return{...m,seen:true};}).filter(Boolean)};});
  const openChat=peerId=>{setChatPeer(peerId);setIncog(false);setView("chat");setSidebar(false);setTimeout(()=>{const cv=cid(me.id,peerId);(msgs[cv]||[]).forEach(m=>{if(m.from!==me.id&&!m.seen)markSeen(cv,m.id);});},400);};

  /* Profile */
  const saveProfile=()=>{
    if(!profEdit)return;
    if(profEdit.newPw){if(profEdit.curPw!==me.password){showT("Current password incorrect.","error");return;}if(profEdit.newPw!==profEdit.conPw){showT("Passwords don't match.","error");return;}}
    const upd={...me,displayName:profEdit.dn||me.displayName,username:profEdit.un||me.username,bio:profEdit.bio??me.bio,pic:profEdit.pic??me.pic,banner:profEdit.bannerImg?null:profEdit.banner??me.banner,bannerImg:profEdit.bannerImg??me.bannerImg,...(profEdit.newPw?{password:profEdit.newPw}:{})};
    setUsers(p=>p.map(u=>u.id===me.id?upd:u));setMe(upd);setProfEdit(null);setView("dashboard");showT("Profile updated! ✓","success");
  };

  /* Admin */
  const doBan=(userId,dur,reason)=>{const until=dur==="perm"?"perm":Date.now()+parseInt(dur)*60000;setBans(p=>[...p.filter(b=>b.userId!==userId),{userId,until,reason}]);showT("User banned.","success");};
  const doUnban=userId=>{setBans(p=>p.filter(b=>b.userId!==userId));showT("User unbanned.","success");};
  const doAddAdmin=()=>{
    if(!addAdmF.u||!addAdmF.p){showT("Username & password required.","warn");return;}

    else{const nu={id:addAdmF.u,username:addAdmF.u,displayName:addAdmF.dn||"te-code-owner",password:addAdmF.p,bio:"",banner:null,pic:null,isAdmin:true,online:false};setUsers(p=>[...p,nu]);showT("Admin created.","success");}
    setAddAdmF({u:"",dn:"",p:""});

      <div style={{position:"absolute",top:-150,left:"50%",transform:"translateX(-50%)",width:700,height:350,background:"radial-gradient(ellipse,#4facfe0d,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:420,animation:"fadeIn .4s"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:54,fontFamily:"Oxanium,monospace",fontWeight:800,background:"linear-gradient(135deg,#4facfe,#00f2fe)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-2px"}}>tecode</div>
          <div style={{color:"#4facfe80",fontSize:11,letterSpacing:5,textTransform:"uppercase",marginTop:4}}>connect beyond limits</div>
        </div>
        <div style={{display:"flex",background:"#0e1219",borderRadius:12,padding:4,marginBottom:24,border:"1px solid #1e2535"}}>
          {["login","signup"].map(t=>(
            <button key={t} onClick={()=>{setView(t);setAErr("");}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:view===t?"linear-gradient(135deg,#4facfe,#00f2fe)":"transparent",color:view===t?"#07090f":"#6b7299",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:14,cursor:"pointer",transition:"all .2s"}}>
              {t==="login"?"Sign In":"Sign Up"}
            </button>
          ))}
        </div>
        <div style={{background:"#0e1219",borderRadius:16,padding:28,border:"1px solid #1e2535",boxShadow:"0 24px 60px #000a"}}>
          {aErr&&<div style={{background:"#ff475718",border:"1px solid #ff475740",borderRadius:8,padding:"10px 14px",color:"#ff6b7a",fontSize:13,marginBottom:16}}>{aErr}</div>}
          {view==="signup"&&<><Field label="Display Name *" value={sf.dn} onChange={v=>setSf(p=>({...p,dn:v}))} placeholder="How others see you"/><Field label="Profile Picture" type="file" onChange={v=>setSf(p=>({...p,pic:v}))}/></>}
          <Field label="Username *" value={view==="login"?lf.u:sf.u} onChange={v=>view==="login"?setLf(p=>({...p,u:v})):setSf(p=>({...p,u:v}))} placeholder="@username"/>
          <Field label="Password *" type="password" value={view==="login"?lf.p:sf.p} onChange={v=>view==="login"?setLf(p=>({...p,p:v})):setSf(p=>({...p,p:v}))} placeholder="••••••••" onEnter={view==="login"?doLogin:doSignup}/>
          <Btn onClick={view==="login"?doLogin:doSignup} full sx={{marginTop:4,padding:"14px",fontSize:15}}>{view==="login"?"Sign In →":"Create Account →"}</Btn>

        </div>
      </div>
    </div>
  );

  /* ── RENDER PROFILE VIEW ── */
  if(viewProf){const u=viewProf;return(
    <div style={{background:"#07090f",minHeight:"100vh",animation:"fadeIn .2s",overflowX:"hidden"}}>
      {/* Top nav bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",position:"absolute",top:0,left:0,right:0,zIndex:10}}>
        <button onClick={()=>setViewProf(null)} style={{background:"#00000080",border:"none",borderRadius:10,color:"#fff",padding:"9px 18px",cursor:"pointer",fontFamily:"Oxanium,monospace",fontSize:14,fontWeight:700}}>← Back</button>
        {u.id===me?.id&&<button onClick={()=>{setProfEdit({dn:me.displayName,un:me.username,bio:me.bio,pic:me.pic,banner:me.banner,curPw:"",newPw:"",conPw:""});setViewProf(null);setView("profile");}} style={{background:"#00000080",border:"none",borderRadius:10,color:"#fff",padding:"9px 18px",cursor:"pointer",fontFamily:"Oxanium,monospace",fontSize:14,fontWeight:700}}>✏ Edit</button>}
      </div>
      {/* Banner full width */}
      <div style={{width:"100%",height:220,background:u.bannerImg?"none":bnr(u.banner||"g0"),backgroundImage:u.bannerImg?`url(${u.bannerImg})`:"",backgroundSize:"cover",backgroundPosition:"center"}}/>
      {/* Profile card */}

            {u.isAdmin&&<span style={{fontSize:12,background:"#ffa50225",color:"#ffa502",border:"1px solid #ffa50240",borderRadius:6,padding:"4px 10px",fontWeight:700,fontFamily:"Oxanium,monospace"}}>Admin</span>}
            <Dot on={u.online} sx={{width:12,height:12}}/>
            <span style={{fontSize:13,color:u.online?"#2ed573":"#6b7299",fontWeight:600}}>{u.online?"Online":"Offline"}</span>

          <div style={{fontFamily:"Oxanium,monospace",fontWeight:800,fontSize:26,color:"#e8eaf0",lineHeight:1.1,wordBreak:"break-word"}}>{u.displayName}</div>

      <div style={{padding:20,maxWidth:500,margin:"0 auto"}}>
        {/* Banner preview */}
        <div style={{height:110,borderRadius:12,background:profEdit?.bannerImg?"none":bnr(profEdit?.banner??me.banner),backgroundImage:profEdit?.bannerImg?`url(${profEdit.bannerImg})`:"none",backgroundSize:"cover",backgroundPosition:"center",marginBottom:10,position:"relative",overflow:"hidden"}}>
          {!profEdit?.bannerImg&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap",padding:8}}>
            {GRADS.map((g,i)=><div key={i} onClick={()=>setProfEdit(p=>({...p,banner:`g${i}`,bannerImg:null}))} style={{width:26,height:26,borderRadius:"50%",background:g,cursor:"pointer",border:(profEdit?.banner??me.banner)===`g${i}`?"3px solid #fff":"3px solid transparent",transition:"border .15s"}}/>)}
          </div>}

            <button onClick={()=>setProfEdit(p=>({...p,bannerImg:null}))} style={{background:"#ff4757",border:"none",borderRadius:8,color:"#fff",padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"Oxanium,monospace"}}>Remove Image</button>
          </div>}
        </div>
        <div style={{marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <label style={{background:"#1e2535",border:"1px solid #252a3d",borderRadius:8,padding:"8px 14px",cursor:"pointer",color:"#4facfe",fontSize:13,fontFamily:"Oxanium,monospace",fontWeight:700,display:"inline-flex",alignItems:"center",gap:6}}>

        <Field label="Username" value={profEdit?.un} onChange={v=>setProfEdit(p=>({...p,un:v}))} placeholder={me.username}/>
        <Field label="Bio" type="textarea" value={profEdit?.bio} onChange={v=>setProfEdit(p=>({...p,bio:v}))} placeholder="Tell the world about yourself…"/>
        <Field label="Profile Picture" type="file" onChange={v=>setProfEdit(p=>({...p,pic:v}))}/>
        <div style={{borderTop:"1px solid #1e2535",paddingTop:16,marginTop:4,marginBottom:16}}>
          <div style={{fontSize:11,color:"#3d4460",letterSpacing:2,textTransform:"uppercase",fontFamily:"Oxanium,monospace",marginBottom:12}}>Change Password</div>
          <Field label="Current Password" type="password" value={profEdit?.curPw} onChange={v=>setProfEdit(p=>({...p,curPw:v}))} placeholder="••••••••"/>
          <Field label="New Password" type="password" value={profEdit?.newPw} onChange={v=>setProfEdit(p=>({...p,newPw:v}))} placeholder="••••••••"/>
          <Field label="Confirm Password" type="password" value={profEdit?.conPw} onChange={v=>setProfEdit(p=>({...p,conPw:v}))} placeholder="••••••••"/>
        </div>
        <Btn onClick={saveProfile} full>Save Changes ✓</Btn>
      </div>
      {toast&&<Toast {...toast}/>}
    </div>
  );

  /* ── RENDER ADMIN ── */
  if(view==="admin"&&me?.isAdmin){
    const filt=users.filter(u=>u.id!=="__ai__"&&(u.username.includes(adSearch)||u.displayName.toLowerCase().includes(adSearch.toLowerCase())));
    const tabs=[{id:"users",l:"User Management",ic:"👤"},{id:"bans",l:"Bans",ic:"🚫"},{id:"addadmin",l:"Add Admin",ic:"➕"},{id:"switch",l:"Switch Account",ic:"🔄"}];
    const curTab=tabs.find(t=>t.id===adminTab);
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#07090f",fontFamily:"Jost,sans-serif",overflow:"hidden"}}>

          <button onClick={()=>setSidebar(p=>!p)} style={{background:"none",border:"none",color:"#ffa502",fontSize:22,cursor:"pointer",padding:"4px 6px",lineHeight:1}}>☰</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"Oxanium,monospace",fontWeight:800,fontSize:16,color:"#ffa502"}}>🛡 Admin Panel</div>
            <div style={{fontSize:11,color:"#4b5273"}}>@{me.username} · {curTab?.l}</div>

                  <div style={{textAlign:"center",color:"#3d4460",padding:"30px 0",fontFamily:"Oxanium,monospace"}}>
                    <div style={{fontSize:36,marginBottom:10}}>📸</div>
                    <div style={{fontSize:14,fontWeight:700}}>No status updates</div>
                    <div style={{fontSize:12,marginTop:4}}>Friends statuses will appear here</div>
                  </div>:
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {[...new Map(friendStatuses().map(s=>[s.userId,s])).values()].map(st=>{
                      const u=getU(st.userId);const seen=st.seenBy.includes(me.id);
                      return(
                        <div key={st.userId} style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer",padding:"6px 0"}}
                          onClick={()=>{markStatusSeen(st.id);setStatusView({statuses:friendStatuses().filter(s=>s.userId===st.userId),idx:0});}}>
                          <div style={{width:56,height:56,borderRadius:"50%",border:`3px solid ${seen?"#3d4460":"#4facfe"}`,overflow:"hidden",flexShrink:0}}>
                            <img src={st.media} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          </div>
                          <div style={{flex:1}}>
                            <div style={{color:"#e8eaf0",fontWeight:600,fontSize:14}}>{u?.displayName}</div>
                            <div style={{color:"#4b5273",fontSize:12,marginTop:2}}>{Math.round((Date.now()-st.ts)/3600000)}h ago{seen?" · Seen":""}</div>
                          </div>
                          <div style={{width:10,height:10,borderRadius:"50%",background:u?.online?"#2ed573":"#3d4460",flexShrink:0}}/>
                        </div>
                      );
                    })}
                  </div>
                }
              </div>
            </div>}

        {toast&&<Toast {...toast}/>}

        {/* STATUS VIEWER */}
        {statusView&&(
          <div style={{position:"fixed",inset:0,background:"#000",zIndex:200,display:"flex",flexDirection:"column"}}>
            {statusView.statuses.map((st,i)=>i===statusView.idx&&(
              <div key={st.id} style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{position:"absolute",top:12,left:12,right:12,display:"flex",gap:4,zIndex:10}}>
                  {statusView.statuses.map((_,pi)=>(
                    <div key={pi} style={{flex:1,height:3,borderRadius:2,background:pi<statusView.idx?"#fff":pi===statusView.idx?"#4facfe":"#ffffff40"}}/>
                  ))}
                </div>
                <div style={{position:"absolute",top:28,left:12,right:12,display:"flex",alignItems:"center",gap:10,zIndex:10}}>
                  <Av user={getU(st.userId)} size={36} sx={{border:"2px solid #fff"}}/>
                  <div>
                    <div style={{color:"#fff",fontWeight:700,fontSize:14,fontFamily:"Oxanium,monospace"}}>{getU(st.userId)?.displayName}</div>
                    <div style={{color:"#ffffff90",fontSize:11}}>{Math.round((Date.now()-st.ts)/3600000)}h ago</div>
                  </div>
                  <button onClick={()=>setStatusView(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"#fff",fontSize:28,cursor:"pointer",lineHeight:1}}>×</button>
                </div>
                {st.mediaType==="video"?
                  <video src={st.media} style={{maxWidth:"100%",maxHeight:"100vh",objectFit:"contain"}} autoPlay loop/>:
                  <img src={st.media} style={{maxWidth:"100%",maxHeight:"100vh",objectFit:"contain"}}/>}
                {st.text&&<div style={{position:"absolute",left:`${st.textX}%`,top:`${st.textY}%`,transform:"translate(-50%,-50%)",color:st.textColor,fontSize:st.textSize,fontFamily:"Jost,sans-serif",fontWeight:700,textShadow:"0 2px 12px #000c",textAlign:"center",maxWidth:"80%",wordBreak:"break-word",pointerEvents:"none"}}>{st.text}</div>}
                {statusView.idx>0&&<button onClick={e=>{e.stopPropagation();setStatusView(p=>({...p,idx:p.idx-1}));}} style={{position:"absolute",left:0,top:0,bottom:0,width:"30%",background:"transparent",border:"none",cursor:"pointer"}}/>}
                {statusView.idx<statusView.statuses.length-1&&<button onClick={e=>{e.stopPropagation();setStatusView(p=>({...p,idx:p.idx+1}));}} style={{position:"absolute",right:0,top:0,bottom:0,width:"30%",background:"transparent",border:"none",cursor:"pointer"}}/>}
                {st.userId===me.id&&<div style={{position:"absolute",bottom:20,left:20,right:20,background:"#00000080",borderRadius:10,padding:"10px 14px"}}>
                  <div style={{color:"#fff",fontSize:13}}>👁 {st.seenBy.filter(id=>id!==me.id).length} views</div>
                  <div style={{color:"#ffffff70",fontSize:11,marginTop:3}}>{st.seenBy.filter(id=>id!==me.id).map(id=>getU(id)?.displayName).filter(Boolean).join(", ")||"No views yet"}</div>
                </div>}
              </div>
            ))}
          </div>
        )}

        {/* STATUS UPLOAD */}
        {statusUpload&&(
          <div style={{position:"fixed",inset:0,background:"#07090f",zIndex:300,display:"flex",flexDirection:"column",fontFamily:"Jost,sans-serif"}}>
            <div style={{height:56,background:"#0a0c14",borderBottom:"1px solid #1e2535",display:"flex",alignItems:"center",padding:"0 16px",gap:12,flexShrink:0}}>
              <button onClick={()=>{setStatusUpload(false);setUpMedia(null);setUpText("");}} style={{background:"none",border:"none",color:"#4facfe",fontSize:20,cursor:"pointer"}}>←</button>
              <span style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#e8eaf0",fontSize:16,flex:1}}>New Status</span>
              {upMedia&&<button onClick={postStatus} style={{background:"linear-gradient(135deg,#4facfe,#00f2fe)",border:"none",borderRadius:8,color:"#07090f",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:14,padding:"8px 18px",cursor:"pointer"}}>Post →</button>}
            </div>
            {!upMedia?
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
                <div style={{fontSize:64}}>📸</div>
                <div style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#e8eaf0",fontSize:20}}>Add a Status</div>
                <div style={{color:"#6b7299",fontSize:14,textAlign:"center",maxWidth:320}}>Share a photo or video with your friends. It disappears after 24 hours.</div>
                <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
                  <label style={{background:"linear-gradient(135deg,#4facfe,#00f2fe)",borderRadius:12,padding:"16px 28px",cursor:"pointer",color:"#07090f",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}>
                    📷 Photo
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{setUpMedia(ev.target.result);setUpMediaType("image");};r.readAsDataURL(f);}}}/>
                  </label>
                  <label style={{background:"#1e2535",border:"1px solid #4facfe40",borderRadius:12,padding:"16px 28px",cursor:"pointer",color:"#4facfe",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}>
                    🎬 Video
                    <input type="file" accept="video/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{setUpMedia(ev.target.result);setUpMediaType("video");};r.readAsDataURL(f);}}}/>
                  </label>
                </div>
              </div>:
              <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                <div style={{flex:1,position:"relative",background:"#000",overflow:"hidden",cursor:"crosshair"}}
                  onClick={e=>{const rect=e.currentTarget.getBoundingClientRect();setUpTextX(Math.round(((e.clientX-rect.left)/rect.width)*100));setUpTextY(Math.round(((e.clientY-rect.top)/rect.height)*100));}}>
                  {upMediaType==="image"?
                    <img src={upMedia} style={{width:"100%",height:"100%",objectFit:"contain"}}/>:
                    <video src={upMedia} style={{width:"100%",height:"100%",objectFit:"contain"}} controls loop/>}
                  {upText&&<div style={{position:"absolute",left:`${upTextX}%`,top:`${upTextY}%`,transform:"translate(-50%,-50%)",color:upTextColor,fontSize:upTextSize,fontFamily:"Jost,sans-serif",fontWeight:700,textShadow:"0 2px 8px #000c",textAlign:"center",maxWidth:"80%",wordBreak:"break-word",pointerEvents:"none"}}>{upText}</div>}
                  {upText&&<div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",background:"#00000080",borderRadius:6,padding:"4px 10px",color:"#fff",fontSize:11,whiteSpace:"nowrap"}}>Tap to move text</div>}
                </div>
                <div style={{background:"#0a0c14",borderTop:"1px solid #1e2535",padding:"14px 16px",flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:18,color:"#6b7299"}}>T</span>
                    <input value={upText} onChange={e=>setUpText(e.target.value)} placeholder="Add text to your status…"
                      style={{flex:1,background:"#1e2535",border:"1px solid #252a3d",borderRadius:8,padding:"10px 14px",color:"#e8eaf0",fontSize:14,fontFamily:"Jost,sans-serif",outline:"none"}}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#6b7299"}}>Size</span>
                      <input type="range" min="14" max="48" value={upTextSize} onChange={e=>setUpTextSize(+e.target.value)} style={{width:80}}/>
                      <span style={{fontSize:12,color:"#e8eaf0",minWidth:24}}>{upTextSize}px</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#6b7299"}}>Color</span>
                      <div style={{display:"flex",gap:5}}>
                        {["#ffffff","#000000","#4facfe","#ff69b4","#ffa502","#2ed573","#ff4757","#a18cd1"].map(col=>(
                          <div key={col} onClick={()=>setUpTextColor(col)} style={{width:22,height:22,borderRadius:"50%",background:col,cursor:"pointer",border:upTextColor===col?"3px solid #e8eaf0":"2px solid #ffffff30",transition:"border .15s"}}/>
                        ))}
                      </div>
                    </div>
                  </div>
                  <div style={{marginTop:10,fontSize:12,color:"#4b5273"}}>💡 Tap on the image to place text at that position</div>
                </div>
              </div>
            }
          </div>
        )}
      </div>
    );
  }

  /* ── RENDER CHAT ── */
  if(view==="chat"){
    const peer=getU(chatPeer);const convList=convMs(chatPeer);const isAI=chatPeer==="__ai__";
    const T=incog?{bg:"#fff0f5",hdr:"#ffe4ef",bdr:"#ffb3d1",acc:"#ff69b4",txt:"#5a1a33",muted:"#a05070",bMeTxt:"#fff",bMe:"#ff85c2",bThm:"#ffc0d9",bThmTxt:"#4a1228",inp:"#ffe4ef"}:{bg:"#07090f",hdr:"#0a0c14",bdr:"#1e2535",acc:"#4facfe",txt:"#e8eaf0",muted:"#6b7299",bMeTxt:"#07090f",bMe:"linear-gradient(135deg,#4facfe,#00f2fe)",bThm:"#1e2535",bThmTxt:"#e8eaf0",inp:"#0e1219"};
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg,transition:"background .35s"}}>
        {/* Header */}
        <div style={{padding:"0 14px",height:58,background:T.hdr,borderBottom:`1px solid ${T.bdr}`,display:"flex",alignItems:"center",gap:12,flexShrink:0,transition:"background .35s"}}>
          <button onClick={()=>setView("dashboard")} style={{background:"none",border:"none",color:T.acc,cursor:"pointer",fontSize:20,padding:"4px 8px"}}>←</button>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setViewProf(peer)}><Av user={peer} size={36}/>{peer?.online&&<Dot on sx={{position:"absolute",bottom:0,right:0,width:9,height:9}}/>}</div>
          <div style={{flex:1,cursor:"pointer"}} onClick={()=>setViewProf(peer)}>
            <div style={{fontWeight:700,color:T.txt,fontSize:15,fontFamily:"Oxanium,monospace"}}>{peer?.displayName}</div>
            <div style={{fontSize:11,color:peer?.online?"#2ed573":T.muted}}>{peer?.online?"● Online":"○ Offline"}</div>
          </div>
          {!isAI&&<>
            <button title="Voice Call" onClick={()=>startCall("audio")} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:18,padding:"4px 6px",borderRadius:6,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#2ed573"} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>📞</button>
            <button title="Video Call" onClick={()=>startCall("video")} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:18,padding:"4px 6px",borderRadius:6,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#4facfe"} onMouseLeave={e=>e.currentTarget.style.color=T.muted}>📹</button>
          </>}
          {!isAI&&<button onClick={()=>setIncog(p=>!p)} title="Incognito" style={{background:incog?"#ff69b420":"transparent",border:`1px solid ${incog?"#ff69b460":"transparent"}`,borderRadius:8,color:incog?"#ff69b4":T.muted,cursor:"pointer",padding:"6px 10px",fontSize:15,transition:"all .2s"}}>👻</button>}
        </div>
        {incog&&<div style={{background:"#ff69b418",borderBottom:"1px solid #ff69b430",padding:"5px 16px",fontSize:12,color:"#ff85c2",display:"flex",alignItems:"center",gap:8}}>
          <span>👻</span><strong>Incognito</strong> — Messages vanish after being seen
        </div>}
        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"14px 10px",display:"flex",flexDirection:"column",gap:2}}>
          {convList.length===0&&<div style={{textAlign:"center",color:T.muted,marginTop:70,fontFamily:"Oxanium,monospace"}}>
            <Av user={peer} size={64} sx={{margin:"0 auto 14px"}}/>
            <div style={{fontSize:20,fontWeight:700,color:T.txt}}>{peer?.displayName}</div>
            <div style={{fontSize:13,marginTop:5}}>{isAI?"Your AI companion. Ask me anything!":"Start the conversation!"}</div>
          </div>}
          {convList.map((m,i)=>{
            const isMe=m.from===me.id;const sender=getU(m.from);
            const replyMsg=m.reply?convList.find(x=>x.id===m.reply):null;
            const showAv=!isMe&&(i===0||convList[i-1]?.from!==m.from);
            if(!isMe&&!m.seen)setTimeout(()=>markSeen(cid(me.id,chatPeer),m.id),700);
            return(
              <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginBottom:showAv?4:0,animation:"fadeIn .12s"}}>
                {replyMsg&&<div style={{fontSize:11,color:T.muted,padding:"2px 10px",background:T.hdr,borderRadius:6,marginBottom:2,maxWidth:"68%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:`2px solid ${T.acc}`,alignSelf:isMe?"flex-end":"flex-start"}}>↩ {getU(replyMsg.from)?.displayName}: {replyMsg.text}</div>}
                <div style={{display:"flex",alignItems:"flex-end",gap:8,flexDirection:isMe?"row-reverse":"row"}}>
                  <div style={{width:28,flexShrink:0}}>{!isMe&&showAv&&<Av user={sender} size={28}/>}</div>
                  <div style={{maxWidth:"70%"}}>
                    {showAv&&!isMe&&<div style={{fontSize:11,color:T.muted,marginBottom:3,paddingLeft:2}}>{sender?.displayName}</div>}
                    <div style={{background:isMe?T.bMe:T.bThm,color:isMe?T.bMeTxt:T.bThmTxt,padding:"9px 13px",borderRadius:isMe?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.5,wordBreak:"break-word",cursor:"pointer",border:incog&&!isMe?"1px solid #ffb3d170":"none"}} onClick={()=>setReplyTo(m.id)} title="Reply">
                      {m.incog&&<span style={{marginRight:5,fontSize:11}}>⏱</span>}{m.text}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3,justifyContent:isMe?"flex-end":"flex-start"}}>
                      <span style={{fontSize:10,color:T.muted}}>{tfmt(m.ts)}</span>
                      {isMe&&<span style={{fontSize:10,color:m.seen?T.acc:T.muted}}>{m.seen?"👁 Seen":"✓"}</span>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          {aiLoad&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
            <Av user={AI_BOT} size={28}/>
            <div style={{background:"#1e2535",borderRadius:"18px 18px 18px 4px",padding:"10px 14px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#4facfe",animation:"pulse 1.2s infinite",animationDelay:`${i*.2}s`}}/>)}
            </div>
          </div>}
          <div ref={msgEnd}/>
        </div>
        {replyTo&&<div style={{padding:"6px 12px",background:T.hdr,borderTop:`1px solid ${T.bdr}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,fontSize:12,color:T.muted,borderLeft:`2px solid ${T.acc}`,paddingLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>↩ {convList.find(m=>m.id===replyTo)?.text}</div>
          <button onClick={()=>setReplyTo(null)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:18}}>×</button>
        </div>}
        <div style={{padding:"10px 12px",background:T.hdr,borderTop:`1px solid ${T.bdr}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          {incog&&<span style={{fontSize:18}}>👻</span>}
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()}
            placeholder={incog?"Ghost message (self-destructs on view)…":"Type a message…"}
            style={{flex:1,background:T.inp,border:`1px solid ${T.bdr}`,borderRadius:24,padding:"10px 16px",color:T.txt,fontSize:14,fontFamily:"Jost,sans-serif",outline:"none",transition:"border-color .2s"}}
            onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.bdr}/>
          <button onClick={sendMsg} style={{width:42,height:42,borderRadius:"50%",background:incog?"linear-gradient(135deg,#ff85c2,#ff69b4)":"linear-gradient(135deg,#4facfe,#00f2fe)",border:"none",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↑</button>
        </div>
        {/* ── INCOMING CALL ── */}
        {incomingCall&&!callUI&&<div style={{position:"fixed",bottom:24,right:24,background:"#0e1219",borderRadius:20,padding:"20px 24px",border:"1px solid #2ed57340",boxShadow:"0 8px 40px #000a",zIndex:500,minWidth:280,animation:"fadeIn .2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
            <div style={{position:"relative"}}>
              <Av user={getU(incomingCall.from)} size={52}/>
              <div style={{position:"absolute",inset:-4,borderRadius:"50%",border:"2px solid #2ed573",animation:"ring 1s infinite"}}/>
            </div>
            <div>
              <div style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#e8eaf0",fontSize:16}}>{getU(incomingCall.from)?.displayName}</div>
              <div style={{color:"#6b7299",fontSize:13,marginTop:2}}>{incomingCall.type==="video"?"📹 Incoming Video Call":"📞 Incoming Voice Call"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:12}}>
            <button onClick={answerCall} style={{flex:1,background:"#2ed573",border:"none",borderRadius:12,color:"#07090f",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:15,padding:"12px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {incomingCall.type==="video"?"📹":"📞"} Answer
            </button>
            <button onClick={declineCall} style={{flex:1,background:"#ff4757",border:"none",borderRadius:12,color:"#fff",fontFamily:"Oxanium,monospace",fontWeight:700,fontSize:15,padding:"12px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📵 Decline
            </button>
          </div>
        </div>}

        {/* ── ACTIVE/CALLING CALL UI ── */}
        {callUI&&<div style={{position:"fixed",inset:0,background:callUI.type==="video"?"#0a0a0a":"linear-gradient(180deg,#1a1d2e,#07090f)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:400}}>
          {/* Video feeds */}
          {callUI.type==="video"&&callUI.state==="active"&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {/* Remote feed placeholder */}
            <div style={{width:"100%",height:"100%",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
              <Av user={getU(callUI.peer)} size={100}/>
              <div style={{color:"#6b7299",fontSize:14,fontFamily:"Jost,sans-serif"}}>{getU(callUI.peer)?.displayName}'s camera</div>
            </div>
            {/* Self preview - bottom right */}
            {callStream&&callStream.getVideoTracks().length>0&&!callCamOff&&<div style={{position:"absolute",bottom:100,right:20,width:120,height:160,background:"#222",borderRadius:12,border:"2px solid #ffffff20",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{color:"#6b7299",fontSize:11,textAlign:"center",padding:8}}>📷 You</div>
            </div>}
          </div>}

          {/* Center info */}
          <div style={{textAlign:"center",zIndex:10}}>
            <div style={{position:"relative",display:"inline-block",marginBottom:20}}>
              <Av user={getU(callUI.peer)} size={callUI.state==="calling"?100:80} sx={{margin:"0 auto"}}/>
              {callUI.state==="calling"&&<>
                <div style={{position:"absolute",inset:-8,borderRadius:"50%",border:"2px solid #4facfe40",animation:"ring 1.2s infinite"}}/>
                <div style={{position:"absolute",inset:-16,borderRadius:"50%",border:"2px solid #4facfe20",animation:"ring 1.2s infinite",animationDelay:".4s"}}/>
              </>}
            </div>
            <div style={{fontFamily:"Oxanium,monospace",fontWeight:800,fontSize:24,color:"#e8eaf0",marginBottom:8}}>{getU(callUI.peer)?.displayName}</div>
            <div style={{fontSize:14,color:callUI.state==="calling"?"#4facfe":"#2ed573",fontFamily:"Oxanium,monospace",marginBottom:4}}>
              {callUI.state==="calling"?"Ringing…":callUI.type==="video"?"Video Call":"Voice Call"}
            </div>
            {callUI.state==="active"&&<div style={{fontSize:16,color:"#e8eaf0",fontFamily:"Oxanium,monospace",letterSpacing:2}}>{fmtT(callSec)}</div>}
          </div>

          {/* Controls */}
          <div style={{position:"absolute",bottom:40,display:"flex",gap:20,alignItems:"center"}}>
            {callUI.state==="active"&&<>
              <button onClick={toggleMute} title={callMuted?"Unmute":"Mute"}
                style={{width:56,height:56,borderRadius:"50%",background:callMuted?"#ff4757":"#2a2f45",border:"none",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                {callMuted?"🔇":"🎤"}
              </button>

                <div style={{padding:"14px 16px"}}>
                  <div style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#e8eaf0",fontSize:15,marginBottom:3}}>{s.name}</div>
                  <div style={{color:"#4b5273",fontSize:12,marginBottom:8}}>{s.members.length} members</div>
                  {s.desc&&<div style={{color:"#6b7299",fontSize:13,marginBottom:10}}>{s.desc}</div>}
                  <Btn onClick={()=>joinSrv(s.id)} v="primary" sm full>Join Server</Btn>
                </div>
              </div>
            ))}
          </div></>}
        </div>
        {/* Modals */}
        {srvModalJSX}
        {toast&&<Toast {...toast}/>}
      </div>
    );
  }

  /* ── SERVER MODAL ── */
    /* ── RENDER: SERVER VIEW ── */
  if(view==="server"&&curSrv){
    const s=getSrv(curSrv);if(!s)return null;
    const allChs=s.cats.flatMap(c=>c.chs);
    const ch=allChs.find(c=>c.id===curCh);
    const key=ch?chKey(s.id,ch.id):"";
    const chMsgs=key?(sMsgs[key]||[]):[];
    const mob=isMobile();
    const myRole=srvRole(s,me.id);
    const pinnedMsgs=chMsgs.filter(m=>m.pinned);

    return(
      <div style={{display:"flex",height:"100vh",background:"#07090f",fontFamily:"Jost,sans-serif",overflow:"hidden",position:"relative"}} onClick={()=>ctxMenu&&setCtxMenu(null)}>
        {/* Context menu */}
        {ctxMenu&&<div style={{position:"fixed",left:ctxMenu.x,top:ctxMenu.y,background:"#161c28",borderRadius:10,padding:"6px",border:"1px solid #252a3d",zIndex:300,minWidth:160,boxShadow:"0 8px 32px #000a"}}>
          {ctxMenu.type==="msg"&&<>
            <div onClick={()=>{setSReplyTo(ctxMenu.id);setCtxMenu(null);}} style={{padding:"8px 12px",color:"#e8eaf0",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>↩ Reply</div>
            <div onClick={()=>{toggleReact(key,ctxMenu.id,"👍");setCtxMenu(null);}} style={{padding:"8px 12px",color:"#e8eaf0",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>👍 React</div>
            <div onClick={()=>{toggleReact(key,ctxMenu.id,"❤️");setCtxMenu(null);}} style={{padding:"8px 12px",color:"#e8eaf0",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>❤️ React</div>
            <div onClick={()=>{toggleReact(key,ctxMenu.id,"🔥");setCtxMenu(null);}} style={{padding:"8px 12px",color:"#e8eaf0",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>🔥 React</div>
            {hasPerm(s,"all")&&<div onClick={()=>{pinMsg(key,ctxMenu.id);setCtxMenu(null);}} style={{padding:"8px 12px",color:"#e8eaf0",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>📌 {chMsgs.find(m=>m.id===ctxMenu.id)?.pinned?"Unpin":"Pin"}</div>}
            {(ctxMenu.from===me.id||hasPerm(s,"all"))&&<div onClick={()=>{delMsg(key,ctxMenu.id);setCtxMenu(null);}} style={{padding:"8px 12px",color:"#ff6b7a",cursor:"pointer",borderRadius:6,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background="#ff475718"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>🗑 Delete</div>}
          </>}
        </div>}

        {/* Server icon rail */}
        <div style={{width:72,background:"#0a0c14",borderRight:"1px solid #1a1f2e",display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0",gap:8,flexShrink:0,overflowY:"auto"}}>
          <div title="All Servers" onClick={()=>{setView("servers");setSrvPanel("chat");}} style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#4facfe,#00f2fe)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginBottom:4,fontSize:18}} title="Servers">🌐</div>
          <div style={{width:32,height:2,background:"#252a3d",borderRadius:1,marginBottom:4}}/>
          {myServs().map(sv=>{const active=sv.id===s.id;return(
            <div key={sv.id} title={sv.name} onClick={()=>{setCurSrv(sv.id);const fc=sv.cats[0]?.chs.find(c=>c.type==="text");setCurCh(fc?.id||null);setSrvPanel("chat");}}
              style={{width:48,height:48,borderRadius:active?"30%":"50%",background:sv.iconGrad,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontFamily:"Oxanium,monospace",fontWeight:800,fontSize:16,color:"#fff",transition:"border-radius .2s",boxShadow:active?"0 0 0 3px #4facfe":"none",flexShrink:0}}>
              {sv.icon?<img src={sv.icon} style={{width:"100%",height:"100%",borderRadius:"inherit",objectFit:"cover"}}/>:sv.name[0].toUpperCase()}
            </div>
          );})}
          <div title="Create Server" onClick={()=>setSModal("create-server")} style={{width:48,height:48,borderRadius:"50%",background:"#1e2535",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:22,color:"#4facfe",marginTop:4,transition:"border-radius .2s,background .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderRadius="30%";e.currentTarget.style.background="#4facfe20";}} onMouseLeave={e=>{e.currentTarget.style.borderRadius="50%";e.currentTarget.style.background="#1e2535";}}>+</div>
          <div title="Dashboard" onClick={()=>setView("dashboard")} style={{width:48,height:48,borderRadius:"50%",background:"#1e2535",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,color:"#6b7299",marginTop:"auto",marginBottom:8,transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="#252a3d"} onMouseLeave={e=>e.currentTarget.style.background="#1e2535"}>🏠</div>
        </div>

        {/* Overlay when sidebar open on mobile */}
        {mob&&srvSidebar&&<div onClick={()=>setSrvSidebar(false)} style={{position:"fixed",inset:0,background:"#000000a0",zIndex:48}}/>}
        {/* Channel sidebar - always in DOM, slides in/out on mobile */}
        <div style={{position:mob?"fixed":"relative",left:mob?0:undefined,top:mob?0:undefined,bottom:mob?0:undefined,zIndex:50,width:240,background:"#0d1017",borderRight:"1px solid #1a1f2e",display:"flex",flexDirection:"column",flexShrink:0,transform:mob?(srvSidebar?"translateX(0)":"translateX(-100%)"):"translateX(0)",transition:"transform .25s cubic-bezier(.4,0,.2,1)",boxShadow:mob&&srvSidebar?"4px 0 24px #000a":"none"}}>
          {/* Server header */}
          <div style={{padding:"0 16px",height:50,borderBottom:"1px solid #1a1f2e",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",flexShrink:0}} onClick={()=>hasPerm(s,"all")&&setSModal("server-settings")}>
            <div style={{fontFamily:"Oxanium,monospace",fontWeight:800,fontSize:15,color:"#e8eaf0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
            {hasPerm(s,"all")&&<span style={{color:"#6b7299",fontSize:16}}>⚙</span>}
          </div>
          {/* Channels */}
          <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
            {s.cats.map(cat=>(
              <div key={cat.id}>
                <div style={{padding:"10px 16px 4px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:"#4b5273",fontFamily:"Oxanium,monospace",fontWeight:700,letterSpacing:1}}>{cat.name}</span>
                  {hasPerm(s,"all")&&<span onClick={()=>{setSModal("add-channel");}} style={{color:"#4b5273",cursor:"pointer",fontSize:16,lineHeight:1}} title="Add channel">+</span>}
                </div>
                {cat.chs.map(c=>(
                  <div key={c.id} onClick={()=>{if(c.type==="voice"){showT("Joined "+c.name+" 🔊","info");return;}setCurCh(c.id);setSrvPanel("chat");if(mob)setSrvSidebar(false);}}
                    style={{padding:"6px 16px",display:"flex",alignItems:"center",gap:8,cursor:"pointer",background:curCh===c.id?"#1e2535":"transparent",borderRadius:"0 6px 6px 0",marginRight:8,transition:"background .12s",color:curCh===c.id?"#e8eaf0":"#6b7299",fontSize:14}}
                    onMouseEnter={e=>{if(curCh!==c.id)e.currentTarget.style.background="#161c28";}} onMouseLeave={e=>{if(curCh!==c.id)e.currentTarget.style.background="transparent";}}>
                    <span style={{fontSize:13,color:"#4b5273",flexShrink:0}}>{c.type==="voice"?"🔊":"#"}</span>
                    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                    {c.ro&&<span style={{fontSize:10,color:"#4b5273"}} title="Read-only">🔒</span>}
                    {hasPerm(s,"all")&&<span onClick={e=>{e.stopPropagation();delCh(s.id,c.id);}} style={{color:"#4b5273",fontSize:13,opacity:0,transition:"opacity .15s"}} title="Delete channel"
                      onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>✕</span>}
                  </div>
                ))}
              </div>
            ))}
            {hasPerm(s,"all")&&<div onClick={()=>setSModal("add-category")} style={{padding:"8px 16px",color:"#4b5273",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}} onMouseEnter={e=>e.currentTarget.style.color="#6b7299"} onMouseLeave={e=>e.currentTarget.style.color="#4b5273"}>+ Add Category</div>}
          </div>
          {/* Bottom bar */}
          <div style={{padding:"8px 12px",borderTop:"1px solid #1a1f2e",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{position:"relative",flexShrink:0}}><Av user={me} size={32}/><div style={{position:"absolute",bottom:0,right:0,width:9,height:9,borderRadius:"50%",background:"#2ed573",border:"2px solid #0d1017"}}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"#e8eaf0",fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.members.find(m=>m.userId===me.id)?.nick||me.displayName}</div>
              {myRole&&<div style={{fontSize:11,color:myRole.color}}>{myRole.name}</div>}
            </div>
            <div style={{display:"flex",gap:4}}>
              <button title="Invite People" onClick={()=>setSModal("invite")} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:16,padding:"3px"}}>🔗</button>
              <button title="Leave Server" onClick={()=>{if(!isOwner(s))leaveSrv(s.id);else showT("Transfer ownership before leaving.","warn");}} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:16,padding:"3px"}}>🚪</button>
            </div>
          </div>
        </div>

        {/* Main chat area */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Channel header */}
          <div style={{padding:"0 14px",height:50,background:"#0d1017",borderBottom:"1px solid #1a1f2e",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            {mob&&<button onClick={()=>setSrvSidebar(p=>!p)} style={{background:"none",border:"none",color:"#6b7299",fontSize:20,cursor:"pointer",padding:"4px 6px"}}>☰</button>}
            <button onClick={()=>setView("dashboard")} title="Dashboard" style={{background:"none",border:"none",color:"#6b7299",fontSize:18,cursor:"pointer",padding:"4px 6px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>🏠</button>
            {ch&&<><span style={{color:"#4b5273",fontSize:16}}>{ch.type==="voice"?"🔊":"#"}</span><span style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#e8eaf0",fontSize:15}}>{ch.name}</span></>}
            <div style={{flex:1}}/>
            {pinnedMsgs.length>0&&<button title="Pinned Messages" onClick={()=>setSrvPanel(p=>p==="pins"?"chat":"pins")} style={{background:srvPanel==="pins"?"#4facfe20":"none",border:"none",color:srvPanel==="pins"?"#4facfe":"#6b7299",cursor:"pointer",fontSize:16,padding:"4px 8px",borderRadius:6}}>📌 {pinnedMsgs.length}</button>}
            <button title="Members" onClick={()=>setMembOpen(p=>!p)} style={{background:membOpen?"#4facfe20":"none",border:"none",color:membOpen?"#4facfe":"#6b7299",cursor:"pointer",fontSize:16,padding:"4px 8px",borderRadius:6}}>👥</button>
            {hasPerm(s,"all")&&<><button title="Manage Members" onClick={()=>setSModal("members")} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:16,padding:"4px"}}>⚙</button><button title="Roles" onClick={()=>setSModal("roles")} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:14,padding:"4px"}}>🎭</button><button title="Bans" onClick={()=>setSModal("bans")} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:14,padding:"4px"}}>🚫</button><button title="Invite" onClick={()=>setSModal("invite")} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:14,padding:"4px"}}>🔗</button></>}
          </div>

          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            {/* Messages / Pins panel */}
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {!ch&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#3d4460",fontFamily:"Oxanium,monospace",flexDirection:"column",gap:12}}><div style={{fontSize:52}}>👈</div><div style={{fontSize:18,fontWeight:700}}>Select a channel</div></div>}
              {ch&&srvPanel==="pins"&&<div style={{flex:1,overflowY:"auto",padding:16}}>
                <div style={{fontFamily:"Oxanium,monospace",fontWeight:700,color:"#6b7299",fontSize:12,letterSpacing:1.5,marginBottom:14}}>PINNED MESSAGES — {pinnedMsgs.length}</div>
                {pinnedMsgs.length===0?<div style={{color:"#3d4460",textAlign:"center",marginTop:40}}>No pinned messages</div>:pinnedMsgs.map(m=>{const sender=getU(m.from);return(
                  <div key={m.id} style={{background:"#0e1219",borderRadius:10,padding:"12px 14px",marginBottom:10,border:"1px solid #252a3d",borderLeft:"3px solid #ffa502"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><Av user={sender} size={22}/><span style={{color:"#e8eaf0",fontSize:13,fontWeight:600}}>{sender?.displayName}</span><span style={{color:"#4b5273",fontSize:11}}>{tfmt(m.ts)}</span></div>
                    <div style={{color:"#a0a8bf",fontSize:14}}>{m.text}</div>
                  </div>
                );})}
              </div>}
              {ch&&srvPanel==="chat"&&<>
                <div style={{flex:1,overflowY:"auto",padding:"12px 10px",display:"flex",flexDirection:"column",gap:2}}>
                  {chMsgs.length===0&&<div style={{textAlign:"center",color:"#3d4460",marginTop:60,fontFamily:"Oxanium,monospace"}}>
                    <div style={{fontSize:40,marginBottom:10}}>{ch.type==="voice"?"🔊":"#"}</div>
                    <div style={{fontSize:17,fontWeight:700}}>Welcome to #{ch.name}</div>
                    <div style={{fontSize:13,marginTop:4}}>This is the beginning of this channel.</div>
                  </div>}
                  {chMsgs.map((m,i)=>{
                    const sender=getU(m.from);const isMe=m.from===me.id;
                    const showAv=i===0||chMsgs[i-1]?.from!==m.from||m.ts-chMsgs[i-1]?.ts>300000;
                    const replyMsg=m.reply?chMsgs.find(x=>x.id===m.reply):null;
                    return(
                      <div key={m.id} style={{padding:showAv?"8px 10px 2px":"1px 10px",display:"flex",gap:12,borderRadius:6,transition:"background .1s",cursor:"default",position:"relative"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#0e1219"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                        onContextMenu={e=>{e.preventDefault();setCtxMenu({x:Math.min(e.clientX,window.innerWidth-180),y:Math.min(e.clientY,window.innerHeight-220),id:m.id,from:m.from,type:"msg"});}}>
                        <div style={{width:40,flexShrink:0,paddingTop:showAv?2:0}}>{showAv?<Av user={sender} size={38}/>:<div style={{width:38}}/>}</div>
                        <div style={{flex:1,minWidth:0}}>
                          {replyMsg&&<div style={{fontSize:12,color:"#4b5273",marginBottom:4,paddingLeft:8,borderLeft:"2px solid #4b5273",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>↩ {getU(replyMsg.from)?.displayName}: {replyMsg.text}</div>}
                          {showAv&&<div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:2}}>
                            <span style={{fontWeight:700,color:srvRole(s,m.from)?.color||"#e8eaf0",fontSize:14,fontFamily:"Oxanium,monospace"}}>{sender?.displayName}</span>
                            {s.members.find(mm=>mm.userId===m.from)?.nick&&<span style={{fontSize:11,color:"#4b5273"}}>(nick: {s.members.find(mm=>mm.userId===m.from).nick})</span>}
                            {m.pinned&&<span style={{fontSize:10,color:"#ffa502"}}>📌</span>}
                            <span style={{fontSize:11,color:"#4b5273"}}>{tfmt(m.ts)}</span>
                          </div>}
                          <div style={{color:"#c8ccd6",fontSize:14,lineHeight:1.55,wordBreak:"break-word"}}>{m.text}</div>
                          {m.reactions.filter(r=>r.users.length>0).length>0&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                            {m.reactions.filter(r=>r.users.length>0).map((r,ri)=>(
                              <div key={ri} onClick={()=>toggleReact(key,m.id,r.emoji)} style={{background:r.users.includes(me.id)?"#4facfe25":"#1e2535",border:`1px solid ${r.users.includes(me.id)?"#4facfe50":"#252a3d"}`,borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:r.users.includes(me.id)?"#4facfe":"#9a9db0",transition:"all .15s"}}>
                                {r.emoji}<span style={{fontSize:12,fontWeight:600}}>{r.users.length}</span>
                              </div>
                            ))}
                            <div onClick={()=>{const emojis=["👍","❤️","😂","🔥","😮","👀"];const e=emojis[Math.floor(Math.random()*emojis.length)];toggleReact(key,m.id,e);}} style={{background:"#1e2535",border:"1px solid #252a3d",borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",color:"#6b7299",transition:"all .15s"}} title="Add reaction">+ 😊</div>
                          </div>}
                        </div>
                      </div>
                    );
                  })}
                  <div ref={sMsgEnd}/>
                </div>
                {/* Reply bar */}
                {sReplyTo&&<div style={{padding:"6px 12px",background:"#0d1017",borderTop:"1px solid #1a1f2e",display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,fontSize:12,color:"#6b7299",borderLeft:"2px solid #4facfe",paddingLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>↩ {chMsgs.find(m=>m.id===sReplyTo)?.text}</div>
                  <button onClick={()=>setSReplyTo(null)} style={{background:"none",border:"none",color:"#6b7299",cursor:"pointer",fontSize:16}}>×</button>
                </div>}
                {/* Input */}
                <div style={{padding:"10px 14px",background:"#0d1017",borderTop:"1px solid #1a1f2e",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                  <input value={sInput} onChange={e=>setSInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendSMsg()}
                    placeholder={ch.ro&&!hasPerm(s,"all")?`#${ch.name} is read-only`:`Message #${ch.name}`}
                    disabled={ch.ro&&!hasPerm(s,"all")}
                    style={{flex:1,background:"#1a1f2e",border:"1px solid #252a3d",borderRadius:10,padding:"10px 14px",color:"#e8eaf0",fontSize:14,fontFamily:"Jost,sans-serif",outline:"none",transition:"border-color .2s",opacity:ch.ro&&!hasPerm(s,"all")?.5:1}}
                    onFocus={e=>e.target.style.borderColor="#4facfe"} onBlur={e=>e.target.style.borderColor="#252a3d"}/>
                  <button onClick={sendSMsg} style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#4facfe,#00f2fe)",border:"none",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↑</button>
                </div>
              </>}
            </div>

            {/* Member list */}
            {membOpen&&!mob&&<div style={{width:220,background:"#0d1017",borderLeft:"1px solid #1a1f2e",overflowY:"auto",flexShrink:0}}>
              <div style={{padding:"14px 12px 8px",fontFamily:"Oxanium,monospace",fontSize:11,color:"#4b5273",letterSpacing:1.5}}>MEMBERS — {s.members.length}</div>
              {s.roles.map(role=>{const mems=s.members.filter(m=>m.roleId===role.id);if(!mems.length)return null;return(
                <div key={role.id}>
                  <div style={{padding:"6px 12px 4px",fontSize:11,color:role.color,fontFamily:"Oxanium,monospace",fontWeight:700,letterSpacing:1}}>{role.name.toUpperCase()} — {mems.length}</div>
                  {mems.map(m=>{const u=getU(m.userId);return(
                    <div key={m.userId} style={{padding:"5px 12px",display:"flex",alignItems:"center",gap:8,borderRadius:4,cursor:"pointer",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="#161c28"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{position:"relative",flexShrink:0}}><Av user={u} size={28}/><div style={{position:"absolute",bottom:0,right:0,width:8,height:8,borderRadius:"50%",background:u?.online?"#2ed573":"#4b5273",border:"2px solid #0d1017"}}/></div>
                      <div style={{flex:1,minWidth:0}}><div style={{color:"#c8ccd6",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.nick||u?.displayName}</div></div>
                    </div>
                  );})}
                </div>
              );})}
            </div>}
          </div>
        </div>

        {srvModalJSX}
        {toast&&<Toast {...toast}/>}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TeCode));
</script>
</body>
</html>
